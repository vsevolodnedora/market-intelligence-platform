# Source:

doc_id: "de-ucits-etf-kernel"
title: "Germany-tax-aware, settled-cash-aware, single-route UCITS ETF execution, accounting, and allocation-research kernel"
content_hash_hint: "sha256:c58e759f6784"
sections:

- {id: "de-ucits-etf-kernel-01-charter", heading: "1) Project charter", level: 2, summary: "Defines the project goal, terminal success states, and why the gates are sequenced.", tags: ["charter", "governance", "gates"], line_start: 3, line_end: 4}
- {id: "de-ucits-etf-kernel-01-objective", heading: "Objective", level: 3, summary: "States the kernel objective: broker-correct execution, accounting, tax state, reconciliation, and falsifiable low-turnover research.", tags: ["objective", "execution", "accounting", "tax"], line_start: 5, line_end: 14}
- {id: "de-ucits-etf-kernel-01-v1-scope-frame", heading: "What v1 is and is not", level: 3, summary: "Narrows v1 to a single-route execution and accounting kernel rather than a broad trading platform or scalable allocator.", tags: ["scope", "v1", "constraints"], line_start: 15, line_end: 27}
- {id: "de-ucits-etf-kernel-01-success-criteria", heading: "Primary success criteria", level: 3, summary: "Defines full-success and narrow-success outcomes through four sequential gates and their sequencing rationale.", tags: ["gates", "success", "governance"], line_start: 28, line_end: 55}
- {id: "de-ucits-etf-kernel-01-context-note", heading: "Context note", level: 4, summary: "Explains why current IBKR Germany minimum commissions dominate small-ticket economics and drive the capital schedule.", tags: ["costs", "ibkr", "capital"], depends_on: ["de-ucits-etf-kernel-01-success-criteria"], line_start: 56, line_end: 64}
- {id: "de-ucits-etf-kernel-02-scope-decisions", heading: "2) Hard scope decisions", level: 2, summary: "Lists what v1 includes, excludes, and explicitly defers so later work stays additive.", tags: ["scope", "deferred", "v1"], line_start: 65, line_end: 66}
- {id: "de-ucits-etf-kernel-02-in-scope", heading: "v1 Scope", level: 3, summary: "Enumerates the supported investor, broker, instrument, research, and bookkeeping scope for v1.", tags: ["scope", "investor", "broker", "journal"], line_start: 67, line_end: 77}
- {id: "de-ucits-etf-kernel-02-out-of-scope", heading: "Out of Scope for v1", level: 3, summary: "Lists the trading, routing, automation, and strategy capabilities intentionally excluded from v1.", tags: ["scope", "exclusions", "v1"], line_start: 78, line_end: 89}
- {id: "de-ucits-etf-kernel-02-deferred", heading: "Explicitly deferred to v2 (or to a later v1 hardening pass)", level: 3, summary: "Names capabilities acknowledged in the design but deferred because they add cost without v1 value at the target scale.", tags: ["deferred", "v2", "hardening"], line_start: 90, line_end: 103}
- {id: "de-ucits-etf-kernel-03-external-assumptions", heading: "3) External assumptions that the design must respect", level: 2, summary: "Pins the broker, market, tax, retail-eligibility, and reporting assumptions the design must honor.", tags: ["assumptions", "external", "constraints"], line_start: 104, line_end: 105}
- {id: "de-ucits-etf-kernel-03-broker-market-assumptions", heading: "Broker and market micro-assumptions=", level: 3, summary: "Captures settlement, session, routing, commission, and XLM assumptions taken from broker and exchange materials.", tags: ["broker", "market", "settlement", "fees"], line_start: 106, line_end: 129}
- {id: "de-ucits-etf-kernel-03-german-tax-assumptions", heading: "German fund-tax assumptions", level: 3, summary: "Pins the InvStG and Basiszins assumptions that make tax handling effective-dated and externally sourced.", tags: ["tax", "germany", "invstg"], line_start: 130, line_end: 135}
- {id: "de-ucits-etf-kernel-03-retail-eligibility-assumptions", heading: "Retail eligibility assumptions", level: 3, summary: "Defines BaFin and PRIIPs/KID assumptions and warns that eligibility checks must be date-aware.", tags: ["eligibility", "retail", "priips"], line_start: 136, line_end: 141}
- {id: "de-ucits-etf-kernel-03-broker-reporting-assumptions", heading: "Broker reporting assumptions", level: 3, summary: "Separates intraday execution truth from delayed reconciliation truth and motivates the canonical identity model.", tags: ["reporting", "ibkr", "reconciliation"], line_start: 142, line_end: 150}
- {id: "de-ucits-etf-kernel-04-operating-philosophy", heading: "4) Operating Philosophy", level: 2, summary: "States the governing rules for rejection, correctness priority, scope separation, truth hierarchy, human review, and stale-data handling.", tags: ["philosophy", "rules", "invariants"], line_start: 151, line_end: 154}
- {id: "de-ucits-etf-kernel-04-rule-1", heading: "Rule 1 — Unsupported cases are rejected, not approximated", level: 3, summary: "Requires the system to reject any trade whose cash, fee, session, eligibility, or tax assumptions cannot be proven.", tags: ["rule", "admission", "safety"], line_start: 155, line_end: 158}
- {id: "de-ucits-etf-kernel-04-rule-2", heading: "Rule 2 — v1 optimizes for correctness first, economics second, breadth last", level: 3, summary: "Orders priorities so exact reconciliation comes before economics and economics before scope expansion.", tags: ["rule", "priorities", "correctness"], line_start: 159, line_end: 163}
- {id: "de-ucits-etf-kernel-04-rule-3", heading: "Rule 3 — Separate research scope from live scope", level: 3, summary: "Requires the research universe, live universe, and supported live execution profile to remain explicitly separate.", tags: ["rule", "research", "live"], line_start: 164, line_end: 167}
- {id: "de-ucits-etf-kernel-04-rule-4", heading: "Rule 4 — Journal is sole economic truth", level: 3, summary: "Makes the append-only journal the only economic source of truth, with execution records kept only for causality.", tags: ["rule", "journal", "truth"], line_start: 168, line_end: 171}
- {id: "de-ucits-etf-kernel-04-rule-5", heading: "Rule 5 — Human review remains mandatory for ambiguous tax/compliance changes", level: 3, summary: "Keeps ambiguous legal, tax, and compliance transitions under human sign-off in v1.", tags: ["rule", "tax", "compliance"], line_start: 172, line_end: 175}
- {id: "de-ucits-etf-kernel-04-rule-6", heading: "Rule 6 — Stale data and transient divergence are handled, not frozen", level: 3, summary: "Defines Green, Amber, and Red operating states so stale or lagged broker data is handled conservatively instead of freezing immediately.", tags: ["rule", "data-state", "reconciliation"], line_start: 176, line_end: 187}
- {id: "de-ucits-etf-kernel-05-live-profile", heading: "5) Concrete v1 live trading profile", level: 2, summary: "Defines the single supported production execution profile and the shadow-profile boundary.", tags: ["profile", "execution", "v1"], line_start: 188, line_end: 189}
- {id: "de-ucits-etf-kernel-05-production-profile", heading: "Supported v1 production execution profile", level: 3, summary: "Pins the one live broker, route, session, order type, pricing plan, and route-pinning rationale allowed in v1.", tags: ["production-profile", "route", "session", "orders"], line_start: 190, line_end: 208}
- {id: "de-ucits-etf-kernel-05-shadow-profiles", heading: "Shadow execution profiles", level: 3, summary: "Keeps alternate routes in paper or simulation only and requires re-pinning plus new gates before promotion.", tags: ["shadow", "routes", "promotion"], depends_on: ["de-ucits-etf-kernel-05-production-profile"], line_start: 209, line_end: 214}
- {id: "de-ucits-etf-kernel-06-capital-policy", heading: "6) Capital policy, economic admission, and route-specific capital schedule", level: 2, summary: "Defines ticket-size economics, AUM thresholds, tiering, admission logic, and the parameters that must be governance-pinned.", tags: ["capital", "admission", "economics"], line_start: 215, line_end: 216}
- {id: "de-ucits-etf-kernel-06-starting-capital", heading: "Starting capital policy", level: 3, summary: "Treats EUR 5,000 as a micro-live proving account for plumbing validation, not as production trading capital.", tags: ["capital", "tier-0", "micro-live"], line_start: 217, line_end: 222}
- {id: "de-ucits-etf-kernel-06-min-economic-notional", heading: "Minimum economic notional (per-ticket constraint)", level: 3, summary: "Defines the minimum order size needed for a route to stay within the configured one-way cost budget.", tags: ["capital", "notional", "cost-budget"], line_start: 223, line_end: 241}
- {id: "de-ucits-etf-kernel-06-min-aum", heading: "Minimum AUM schedule (per-account constraint)", level: 3, summary: "Transforms minimum ticket economics into an account-level AUM requirement plus a tax-aware cash buffer.", tags: ["capital", "aum", "cash-buffer"], depends_on: ["de-ucits-etf-kernel-06-min-economic-notional"], line_start: 242, line_end: 258}
- {id: "de-ucits-etf-kernel-06-tiered-capital-state", heading: "Tiered capital-state policy", level: 3, summary: "Defines Tier 0 to Tier 2 behavior and requires explicit governance approval for tier transitions.", tags: ["tiers", "capital", "governance"], depends_on: ["de-ucits-etf-kernel-06-min-aum"], line_start: 259, line_end: 268}
- {id: "de-ucits-etf-kernel-06-economic-admission", heading: "Economic admission rule — two-level formulation", level: 3, summary: "Splits admission into per-trade fill-conditional point estimates and strategy-level LCB certification.", tags: ["admission", "alpha", "lcb", "fill"], depends_on: ["de-ucits-etf-kernel-06-min-economic-notional", "de-ucits-etf-kernel-06-tiered-capital-state"], line_start: 269, line_end: 305}
- {id: "de-ucits-etf-kernel-06-parameter-pinning", heading: "Governance parameters and pinning", level: 3, summary: "Lists the economic, liquidity, reconciliation, and calibration parameters that must be pinned before gate claims are valid.", tags: ["governance", "parameters", "pinning"], depends_on: ["de-ucits-etf-kernel-06-economic-admission"], line_start: 306, line_end: 326}
- {id: "de-ucits-etf-kernel-07-universe-policy", heading: "7) Universe policy", level: 2, summary: "Defines the research universe, live universe, XLM usage, and source hierarchy for instrument eligibility.", tags: ["universe", "eligibility", "policy"], line_start: 327, line_end: 328}
- {id: "de-ucits-etf-kernel-07-research-universe", heading: "Research universe", level: 3, summary: "Specifies the structural requirements for ETFs that may enter the research universe.", tags: ["universe", "research", "etf"], line_start: 329, line_end: 341}
- {id: "de-ucits-etf-kernel-07-live-universe", heading: "Live universe", level: 3, summary: "Defines the smaller approved live universe and limits XLM to admission and monitoring roles, not per-order gating.", tags: ["universe", "live", "xlm"], depends_on: ["de-ucits-etf-kernel-07-research-universe"], line_start: 342, line_end: 353}
- {id: "de-ucits-etf-kernel-07-eligibility-source-hierarchy", heading: "Source hierarchy for eligibility", level: 3, summary: "Orders issuer, exchange, broker, BaFin, and manual review sources for marketability and KID checks.", tags: ["eligibility", "sources", "priips"], line_start: 354, line_end: 368}
- {id: "de-ucits-etf-kernel-08-compliance-policy", heading: "8) Compliance policy", level: 2, summary: "Defines a tradable-line-centric pre-trade compliance model and the freeze rule for stale or contradictory evidence.", tags: ["compliance", "tradable-line", "policy"], line_start: 369, line_end: 370}
- {id: "de-ucits-etf-kernel-08-instrument-compliance-model", heading: "Instrument compliance model", level: 3, summary: "Defines the tradable line as fund plus listing, currency, broker contract, and effective date, with signed evidence per line.", tags: ["compliance", "tradable-line", "evidence"], line_start: 371, line_end: 398}
- {id: "de-ucits-etf-kernel-08-compliance-control-rule", heading: "Compliance control rule", level: 3, summary: "Requires manual review before any new tradable line goes live and freezes buying when evidence goes stale or conflicts.", tags: ["compliance", "controls", "freeze"], depends_on: ["de-ucits-etf-kernel-08-instrument-compliance-model"], line_start: 399, line_end: 405}
- {id: "de-ucits-etf-kernel-09-tax-model", heading: "9) Tax model, ledgers, and governance", level: 2, summary: "Defines the two-ledger tax architecture, annual reconciliation, authority precedence, and manual governance rule.", tags: ["tax", "ledgers", "governance"], line_start: 406, line_end: 407}
- {id: "de-ucits-etf-kernel-09-tax-design-principle", heading: "Tax design principle", level: 3, summary: "Separates statutory tax state from broker-posted tax cashflows and prevents them from being merged.", tags: ["tax", "ledgers", "design"], line_start: 408, line_end: 412}
- {id: "de-ucits-etf-kernel-09-tax-operational-minimality", heading: "v1 operational minimality", level: 3, summary: "Keeps v1 tax operations event-driven and manually approved while preserving the full ledger shape for later automation.", tags: ["tax", "manual", "v1"], line_start: 413, line_end: 424}
- {id: "de-ucits-etf-kernel-09-statutory-tax-ledger", heading: "A. Statutory tax state ledger", level: 3, summary: "Defines the effective-dated statutory ledger and requires evidence pointers for every dated tax entry.", tags: ["tax", "ledger-a", "classification"], line_start: 425, line_end: 443}
- {id: "de-ucits-etf-kernel-09-tax-authority-precedence", heading: "Authority precedence and disagreement resolution", level: 3, summary: "Assigns which sources govern the statutory ledger versus cash ledger and how unresolved tax deltas become exceptions.", tags: ["tax", "authority", "exceptions"], depends_on: ["de-ucits-etf-kernel-09-statutory-tax-ledger", "de-ucits-etf-kernel-09-tax-cash-ledger"], line_start: 444, line_end: 464}
- {id: "de-ucits-etf-kernel-09-tax-cash-ledger", heading: "B. Account tax-cash ledger", level: 3, summary: "Defines the broker-posted tax cash ledger for withholdings, adjustments, and annual-close postings.", tags: ["tax", "ledger-b", "cashflows"], line_start: 465, line_end: 474}
- {id: "de-ucits-etf-kernel-09-annual-tax-reconciliation", heading: "Annual tax reconciliation", level: 3, summary: "Defines the yearly reconciliation artifact that must explain statutory tax deltas through broker cashflows and explicit bridges.", tags: ["tax", "reconciliation", "year-end"], depends_on: ["de-ucits-etf-kernel-09-statutory-tax-ledger", "de-ucits-etf-kernel-09-tax-cash-ledger"], line_start: 475, line_end: 492}
- {id: "de-ucits-etf-kernel-09-tax-governance-rule", heading: "Tax governance rule", level: 3, summary: "Requires manual annual tax-close sign-off before any computed tax outcome is accepted in production.", tags: ["tax", "governance", "checklist"], depends_on: ["de-ucits-etf-kernel-09-annual-tax-reconciliation"], line_start: 493, line_end: 498}
- {id: "de-ucits-etf-kernel-10-accounting-oms-truth", heading: "10) Accounting, OMS, and source-of-truth model", level: 2, summary: "Defines the journal, execution-event ledger, identity model, replay invariant, and truth hierarchy.", tags: ["accounting", "oms", "truth"], line_start: 499, line_end: 500}
- {id: "de-ucits-etf-kernel-10-economic-truth", heading: "Economic source of truth", level: 3, summary: "Makes the append-only accounting journal the sole economic record for fills, fees, taxes, cash, and corrections.", tags: ["journal", "accounting", "truth"], line_start: 501, line_end: 515}
- {id: "de-ucits-etf-kernel-10-operational-truth", heading: "Operational source of truth", level: 3, summary: "Defines the immutable execution-event ledger that records intent, admission, order lifecycle, and corrections.", tags: ["execution-events", "oms", "causality"], depends_on: ["de-ucits-etf-kernel-10-economic-truth"], line_start: 516, line_end: 531}
- {id: "de-ucits-etf-kernel-10-canonical-identity", heading: "Canonical event identity and correction model", level: 3, summary: "Defines the canonical identifiers, correction grouping, and economic-state-invariance replay rule.", tags: ["identity", "corrections", "replay", "invariant"], depends_on: ["de-ucits-etf-kernel-10-operational-truth"], line_start: 532, line_end: 557}
- {id: "de-ucits-etf-kernel-10-fallback-identity", heading: "Fallback identity for non-API-originated activity", level: 3, summary: "Adds a fallback composite identity for non-API or broker-originated events when broker_perm_id is unavailable.", tags: ["identity", "fallback", "non-api"], depends_on: ["de-ucits-etf-kernel-10-canonical-identity"], line_start: 558, line_end: 583}
- {id: "de-ucits-etf-kernel-10-truth-hierarchy", heading: "Truth hierarchy", level: 3, summary: "Ranks TWS, Trade Confirmation Flex, Activity Flex, and later broker corrections as operational authorities.", tags: ["truth-hierarchy", "ibkr", "reconciliation"], line_start: 584, line_end: 592}
- {id: "de-ucits-etf-kernel-11-cash-settlement-admission", heading: "11) Cash, settlement, and admission controls", level: 2, summary: "Defines buy-side admissibility, broker-first cash authority, cash decomposition, reserves, and settlement-regime modeling.", tags: ["cash", "settlement", "admission"], line_start: 593, line_end: 594}
- {id: "de-ucits-etf-kernel-11-admission-controls", heading: "Admission controls", level: 3, summary: "Lists the cash, fee, spread, tax, and minimum-notional conditions a buy order must satisfy.", tags: ["admission", "cash", "fees"], line_start: 595, line_end: 607}
- {id: "de-ucits-etf-kernel-11-live-admission-authority", heading: "Live admission authority", level: 3, summary: "Makes broker-reported settled cash the live authority and relegates the local settlement engine to forecast and reconciliation roles.", tags: ["admission", "broker-first", "settled-cash"], depends_on: ["de-ucits-etf-kernel-11-admission-controls"], line_start: 608, line_end: 622}
- {id: "de-ucits-etf-kernel-11-cash-state-decomposition", heading: "Cash-state decomposition", level: 3, summary: "Separates trade-date, settled, reserved, and withdrawable cash so each control uses the correct balance.", tags: ["cash", "state", "controls"], line_start: 623, line_end: 633}
- {id: "de-ucits-etf-kernel-11-reserved-cash-policy", heading: "Reserved cash policy", level: 3, summary: "Defines reserved cash as an operational control view and lists the terminal events that release it.", tags: ["cash", "reservation", "controls"], depends_on: ["de-ucits-etf-kernel-11-cash-state-decomposition"], line_start: 634, line_end: 642}
- {id: "de-ucits-etf-kernel-11-settlement-regime-engine", heading: "Settlement regime engine", level: 3, summary: "Models settlement as an effective-dated regime abstraction while limiting v1 to the currently active regime.", tags: ["settlement", "regime", "effective-dated"], line_start: 643, line_end: 665}
- {id: "de-ucits-etf-kernel-12-fee-model", heading: "12) Fee model", level: 2, summary: "Defines fee dimensions, closure requirements, and lifecycle restrictions for the pinned live profile.", tags: ["fees", "model", "closure"], line_start: 666, line_end: 667}
- {id: "de-ucits-etf-kernel-12-fee-design-principle", heading: "Fee design principle", level: 3, summary: "Models fees by route, venue, session, lifecycle, and effective date, using the higher-cost path when ambiguous.", tags: ["fees", "design", "conservative"], line_start: 668, line_end: 682}
- {id: "de-ucits-etf-kernel-12-fee-closure-gate", heading: "Fee-closure gate (pre-production)", level: 3, summary: "Requires live exemplars for every fee dimension touched by the production profile before the profile is production-supported.", tags: ["fees", "gate-2", "exemplars"], depends_on: ["de-ucits-etf-kernel-12-fee-design-principle"], line_start: 683, line_end: 699}
- {id: "de-ucits-etf-kernel-12-gate-2-closure-not-selection", heading: "Gate-2 scope: closure, not selection", level: 3, summary: "Limits Gate 2 to calibrating the pinned route rather than comparing routes statistically in v1.", tags: ["gate-2", "fees", "route-selection"], depends_on: ["de-ucits-etf-kernel-12-fee-closure-gate"], line_start: 700, line_end: 709}
- {id: "de-ucits-etf-kernel-12-order-modification-policy", heading: "Order-modification policy", level: 3, summary: "Avoids modify/replace and overnight persistence because they can reset minimum commissions and queue priority.", tags: ["orders", "fees", "lifecycle"], depends_on: ["de-ucits-etf-kernel-12-fee-design-principle"], line_start: 710, line_end: 723}
- {id: "de-ucits-etf-kernel-13-research-execution-policy", heading: "13) Research, ranking, rebalance, and deterministic execution policy", level: 2, summary: "Defines the simple v1 alpha process, liquidity checks, deterministic execution rule, fill modeling, and re-submit budget.", tags: ["research", "execution", "liquidity"], line_start: 724, line_end: 725}
- {id: "de-ucits-etf-kernel-13-v1-alpha-policy", heading: "v1 alpha policy", level: 3, summary: "Restricts alpha to slow, ETF-native signals without issuer-event propagation, NLP, or intraday reactivity.", tags: ["alpha", "strategy", "v1"], line_start: 726, line_end: 735}
- {id: "de-ucits-etf-kernel-13-decision-cadence", heading: "Decision cadence (configurable but fixed for v1)", level: 3, summary: "Pins review and trading cadence so live decisions remain low-turnover and threshold-driven.", tags: ["cadence", "reviews", "turnover"], depends_on: ["de-ucits-etf-kernel-13-v1-alpha-policy"], line_start: 736, line_end: 740}
- {id: "de-ucits-etf-kernel-13-decision-benchmark", heading: "Trade decision benchmark", level: 3, summary: "Evaluates each live trade against doing nothing and against a no-turnover strategic reference basket.", tags: ["benchmark", "decisions", "alpha"], depends_on: ["de-ucits-etf-kernel-13-v1-alpha-policy"], line_start: 741, line_end: 747}
- {id: "de-ucits-etf-kernel-13-default-live-strategy", heading: "Default live strategy form", level: 3, summary: "Sets the initial live strategy to threshold-first low-turnover rebalancing rather than scheduled rotation.", tags: ["strategy", "rebalancing", "live"], depends_on: ["de-ucits-etf-kernel-13-v1-alpha-policy"], line_start: 748, line_end: 751}
- {id: "de-ucits-etf-kernel-13-pre-trade-liquidity-gate", heading: "Pre-trade liquidity gate", level: 3, summary: "Uses XLM only for universe-level checks and reserves, while per-order gating uses ticket-size-native spread and slippage constraints.", tags: ["liquidity", "xlm", "spread"], line_start: 752, line_end: 775}
- {id: "de-ucits-etf-kernel-13-limit-price-construction", heading: "Limit-price construction (deterministic)", level: 3, summary: "Defines a deterministic limit-price rule anchored to top-of-book, spread budget, and a single cancel-re-submit policy.", tags: ["execution", "limit-price", "deterministic"], depends_on: ["de-ucits-etf-kernel-13-pre-trade-liquidity-gate"], line_start: 776, line_end: 787}
- {id: "de-ucits-etf-kernel-13-fill-probability", heading: "Fill-probability as telemetry and stress input (not admission scalar) in v1", level: 3, summary: "Limits p_fill to telemetry, simulator output, and stress overlays instead of using it in the v1 admission scalar.", tags: ["fill-probability", "telemetry", "stress"], depends_on: ["de-ucits-etf-kernel-13-limit-price-construction", "de-ucits-etf-kernel-06-economic-admission"], line_start: 788, line_end: 807}
- {id: "de-ucits-etf-kernel-13-resubmit-budget", heading: "Cancel/re-submit budget (fee-trap control)", level: 3, summary: "Caps re-submits and prices their worst-case commission impact into admission to avoid a fee-trap from repeated DAY orders.", tags: ["resubmit", "fees", "controls"], depends_on: ["de-ucits-etf-kernel-13-limit-price-construction", "de-ucits-etf-kernel-12-fee-design-principle"], line_start: 808, line_end: 823}
- {id: "de-ucits-etf-kernel-14-reference-data-model", heading: "14) Data and reference-data model", level: 2, summary: "Defines the effective-dated reference data, evidence registry, snapshot binding, and sequencing note for support infrastructure.", tags: ["reference-data", "evidence", "versioning"], line_start: 824, line_end: 825}
- {id: "de-ucits-etf-kernel-14-reference-data", heading: "Reference data", level: 3, summary: "Lists the effective-dated reference objects that parameterize live decisions and simulations.", tags: ["reference-data", "effective-dated", "inputs"], line_start: 826, line_end: 843}
- {id: "de-ucits-etf-kernel-14-evidence-registry", heading: "Evidence registry", level: 3, summary: "Defines the evidence record stored for each eligibility, compliance, and tax decision.", tags: ["evidence", "registry", "provenance"], depends_on: ["de-ucits-etf-kernel-14-reference-data"], line_start: 844, line_end: 855}
- {id: "de-ucits-etf-kernel-14-as-of-versioning", heading: "As-of versioning", level: 3, summary: "Requires every backtest and live decision to bind to dated market, reference, evidence, and identity snapshots.", tags: ["versioning", "snapshots", "replay"], depends_on: ["de-ucits-etf-kernel-14-reference-data", "de-ucits-etf-kernel-14-evidence-registry"], line_start: 856, line_end: 867}
- {id: "de-ucits-etf-kernel-14-sequencing-note", heading: "Sequencing note", level: 3, summary: "Says the kernel and replay machinery are built first, with evidence and dated-reference support added only to the scope the live universe needs.", tags: ["sequencing", "delivery", "infrastructure"], depends_on: ["de-ucits-etf-kernel-10-accounting-oms-truth"], line_start: 868, line_end: 873}
- {id: "de-ucits-etf-kernel-15-simulation-backtest-rules", heading: "15) Simulation and backtest rules", level: 2, summary: "Defines the canonical simulator, overlay discipline, validity rules, realism requirements, and mandatory stress tests.", tags: ["simulation", "backtest", "validation"], line_start: 874, line_end: 875}
- {id: "de-ucits-etf-kernel-15-one-simulator", heading: "One conservative simulator with scenario overlays", level: 3, summary: "Uses one canonical simulator for gate evidence and overlay runs only for sensitivity analysis.", tags: ["simulation", "canonical", "overlays"], line_start: 876, line_end: 893}
- {id: "de-ucits-etf-kernel-15-simulator-validity", heading: "Simulator validity rule", level: 3, summary: "Invalidates any backtest that admits orders the live engine would reject under cash, fee, compliance, liquidity, or certification rules.", tags: ["simulation", "validity", "admission"], depends_on: ["de-ucits-etf-kernel-15-one-simulator"], line_start: 894, line_end: 909}
- {id: "de-ucits-etf-kernel-15-backtest-realism", heading: "Backtest realism requirements", level: 3, summary: "Requires the simulator to share the same production fee, admission, liquidity, settlement, and metadata assumptions as live.", tags: ["simulation", "realism", "consistency"], depends_on: ["de-ucits-etf-kernel-15-one-simulator"], line_start: 910, line_end: 924}
- {id: "de-ucits-etf-kernel-15-mandatory-stress-tests", heading: "Mandatory stress tests", level: 3, summary: "Lists the required fee, spread, fill, settlement, stale-data, correction, and data-state stress overlays before paper trading.", tags: ["stress-tests", "simulation", "replay"], depends_on: ["de-ucits-etf-kernel-15-one-simulator"], line_start: 925, line_end: 942}
- {id: "de-ucits-etf-kernel-16-rollout-path", heading: "16) Paper, micro-live, and scale path", level: 2, summary: "Stages the program from feasibility pre-screen through build, paper, micro-live, and controlled scale-up.", tags: ["phases", "rollout", "scale"], line_start: 943, line_end: 944}
- {id: "de-ucits-etf-kernel-16-phase-0-pre-screen", heading: "Phase 0 — Economic feasibility pre-screen", level: 3, summary: "Defines the frozen pre-screen protocol that must show the strategy can plausibly clear the fixed-cost floor before build effort expands.", tags: ["phase", "economics", "pre-screen"], line_start: 945, line_end: 970}
- {id: "de-ucits-etf-kernel-16-phase-a-build", heading: "Phase A — build and offline validation", level: 3, summary: "Builds the kernel, archive, reconciliation views, reference data, and canonical simulator, then exits only on replay success.", tags: ["phase", "build", "validation"], depends_on: ["de-ucits-etf-kernel-16-phase-0-pre-screen"], line_start: 971, line_end: 982}
- {id: "de-ucits-etf-kernel-16-phase-b-paper", heading: "Phase B — paper trading", level: 3, summary: "Runs the exact production profile in paper to validate path consistency and failure handling rather than alpha.", tags: ["phase", "paper", "path-consistency"], depends_on: ["de-ucits-etf-kernel-16-phase-a-build"], line_start: 983, line_end: 994}
- {id: "de-ucits-etf-kernel-16-phase-c-micro-live", heading: "Phase C — micro-live (Tier 0)", level: 3, summary: "Runs constrained live trading with one funded position and no unsupported behaviors while collecting fee-closure evidence.", tags: ["phase", "micro-live", "tier-0"], depends_on: ["de-ucits-etf-kernel-16-phase-b-paper"], line_start: 995, line_end: 1006}
- {id: "de-ucits-etf-kernel-16-phase-d-scale-up", heading: "Phase D — controlled scale-up", level: 3, summary: "Allows tier increases only after the relevant gates pass and enough capital exists for larger funded position counts.", tags: ["phase", "scale-up", "tiers"], depends_on: ["de-ucits-etf-kernel-16-phase-c-micro-live", "de-ucits-etf-kernel-17-acceptance-gates"], line_start: 1007, line_end: 1014}
- {id: "de-ucits-etf-kernel-17-acceptance-gates", heading: "17) Acceptance gates", level: 2, summary: "Collects the four sequential acceptance gates and the rule that later claims cannot outrun earlier gates.", tags: ["gates", "acceptance", "sequencing"], line_start: 1015, line_end: 1018}
- {id: "de-ucits-etf-kernel-17-gate-1", heading: "Gate 1 — Operational correctness", level: 3, summary: "Requires reconciled broker state, pinned profile definition, compliance evidence, shared admission logic, and replay invariance before micro-live.", tags: ["gate", "operational-correctness", "reconciliation"], line_start: 1019, line_end: 1032}
- {id: "de-ucits-etf-kernel-17-gate-2", heading: "Gate 2 — Cost-model closure", level: 3, summary: "Requires pinned governance parameters, fee/slippage closure on the pinned route, and calibrated fill telemetry before cost claims are valid.", tags: ["gate", "cost-model", "fees"], depends_on: ["de-ucits-etf-kernel-17-gate-1"], line_start: 1033, line_end: 1045}
- {id: "de-ucits-etf-kernel-17-gate-3", heading: "Gate 3 — Strategy-level alpha evidence", level: 3, summary: "Requires out-of-sample strategy-level LCB evidence, fill-probability stress survival, and prior Gate 2 closure before live rotation.", tags: ["gate", "alpha", "lcb"], depends_on: ["de-ucits-etf-kernel-17-gate-2"], line_start: 1046, line_end: 1057}
- {id: "de-ucits-etf-kernel-17-gate-4", heading: "Gate 4 — Capital sufficiency", level: 3, summary: "Requires route-specific minimum AUM, adequate buffer, and live ticket sizes consistent with minimum economic notional before position count rises.", tags: ["gate", "capital", "aum"], depends_on: ["de-ucits-etf-kernel-17-gate-3"], line_start: 1058, line_end: 1065}
- {id: "de-ucits-etf-kernel-17-scope-expansion-rule", heading: "Scope-expansion rule", level: 3, summary: "Blocks adding routes or sessions until the first profile passes all four gates and any new profile passes its own Gate 1 and Gate 2.", tags: ["scope-expansion", "gates", "profiles"], depends_on: ["de-ucits-etf-kernel-17-gate-1", "de-ucits-etf-kernel-17-gate-2", "de-ucits-etf-kernel-17-gate-3", "de-ucits-etf-kernel-17-gate-4"], line_start: 1066, line_end: 1071}
- {id: "de-ucits-etf-kernel-18-v2-scaffold", heading: "18) v2 scaffold", level: 2, summary: "Lists the future v2 extensions, the deferred v1 items they absorb, and the v1 disciplines that v2 may not weaken.", tags: ["v2", "roadmap", "constraints"], depends_on: ["de-ucits-etf-kernel-17-gate-1", "de-ucits-etf-kernel-17-gate-2", "de-ucits-etf-kernel-17-gate-3", "de-ucits-etf-kernel-17-gate-4"], line_start: 1072, line_end: 1104}
